networks:
  testpulse-net:

services:
  testpulseback:
    build: ./images/python
    container_name: testpulseback
    restart: always
    environment:
      -  PYTHONDONTWRITEBYTECODE=1
      -  PYTHONUNBUFFERED=1
    volumes:
      - ./pulse_back:/pulse_back
    command: sh -c "pip3 install --no-cache-dir --default-timeout=100 -r requirements.txt && sleep 1  && python3 src/main.py"
    networks:
      - testpulse-net
    ports:
      - 7000:7000

  testfrontpulse:
    build: ./images/npm
    container_name: testfrontpulse
    restart: always
    volumes:
      - ./pulse_front:/pulse
    networks:
      - testpulse-net
    ports:
      - 3020:3000
    stdin_open: true
    tty: true
    command: bash -c "npm install --force && npm i typescript --legacy-peer-deps && npm install --legacy-peer-deps && npm start"
